<!DOCTYPE html>
<html>
<head>
    <title>Risk Calculator</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Risk Calculator Input Page</h1>
        <form action="/" method="post">
            <!-- CPT Code -->
            <div class="form-group">
                <label for="cpt">CPT Code</label>
                <input type="number" name="cpt" id="cpt" class="form-control">
            </div>


            <!-- Age -->
            <div class="form-group">
                <label for="age">Age</label>
                <select name="age" id="age" class="form-control">
                    {% for i in range(18, 113) %}
                        <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Sex -->
            <div class="form-group">
                <label for="sex">Sex</label>
                <select name="sex" id="sex" class="form-control">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <!-- Functional Status -->
            <div class="form-group">
                <label for="fnstatus2">Functional Status</label>
                <select name="fnstatus2" id="fnstatus2" class="form-control">
                    <option value="Independent">Independent</option>
                    <option value="Partially Dependent">Partially Dependent</option>
                    <option value="Totally Dependent">Totally Dependent</option>
                </select>
            </div>
            
            <!-- Emergency Case -->
            <div class="form-group">
                <label for="electsurg">Emergency Case</label>
                <select name="electsurg" id="electsurg" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- ASA Class -->
            <div class="form-group">
                <label for="asaclas">ASA Class</label>
                <select name="asaclas" id="asaclas" class="form-control">
                    <option value="Healthy patient">Healthy patient</option>
                    <option value="Mild systemic disease">Mild systemic disease</option>
                    <option value="Severe systemic disease">Severe systemic disease</option>
                    <option value="Severe systemic disease/constant threat to life">Severe systemic disease/constant threat to life</option>
                    <option value="Moribund/not expected to survive surgery">Moribund/not expected to survive surgery</option>
                </select>
            </div>

            <!-- Steroid use -->
            <div class="form-group">
                <label for="steroid">Steroid use for chronic condition</label>
                <select name="steroid" id="steroid" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Ascites -->
            <div class="form-group">
                <label for="ascites">Ascites within 30 days prior to surgery</label>
                <select name="ascites" id="ascites" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Systemic Sepsis -->
            <div class="form-group">
                <label for="prsepis">Systemic Sepsis within 48 hours prior to surgery</label>
                <select name="prsepis" id="prsepis" class="form-control">
                    <option value="None">None</option>
                    <option value="SIRS">SIRS</option>
                    <option value="Sepsis">Sepsis</option>
                    <option value="Septic Shock">Septic Shock</option>
                </select>
            </div>

            <!-- Ventilator Dependent -->
            <div class="form-group">
                <label for="ventilat">Ventilator Dependent</label>
                <select name="ventilat" id="ventilat" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Disseminated Cancer -->
            <div class="form-group">
                <label for="discancr">Disseminated Cancer</label>
                <select name="discancr" id="discancr" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Diabetes -->
            <div class="form-group">
                <label for="diabetes">Diabetes</label>
                <select name="diabetes" id="diabetes" class="form-control">
                    <option value="No">No</option>
                    <option value="Oral">Oral</option>
                    <option value="Insulin">Insulin</option>
                </select>
            </div>

            <!-- Hypertension requiring medication -->
            <div class="form-group">
                <label for="hypermed">Hypertension requiring medication</label>
                <select name="hypermed" id="hypermed" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Congestive Heart Failure in 30 days prior to surgery -->
            <div class="form-group">
                <label for="hxchf">Congestive Heart Failure in 30 days prior to surgery</label>
                <select name="hxchf" id="hxchf" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Dyspnea -->
            <div class="form-group">
                <label for="dyspnea">Dyspnea</label>
                <select name="dyspnea" id="dyspnea" class="form-control">
                    <option value="No">No</option>
                    <option value="At rest">At rest</option>
                    <option value="With Moderate exertion">With Moderate exertion</option>
                </select>
            </div>

            <!-- Current Smoker within 1 Year -->
            <div class="form-group">
                <label for="smoke">Current Smoker within 1 Year</label>
                <select name="smoke" id="smoke" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- History of Severe COPD -->
            <div class="form-group">
                <label for="hxcopd">History of Severe COPD</label>
                <select name="hxcopd" id="hxcopd" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Dialysis -->
            <div class="form-group">
                <label for="dialysis">Dialysis</label>
                <select name="dialysis" id="dialysis" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Acute Renal Failure -->
            <div class="form-group">
                <label for="renafail">Acute Renal Failure</label>
                <select name="renafail" id="renafail" class="form-control">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- Height in Inches -->
            <div class="form-group">
                <label for="in">Height in Inches</label>
                <input type="number" name="in" id="in" class="form-control">
            </div>

            <!-- Weight in Pounds -->
            <div class="form-group">
                <label for="lbs">Weight in Pounds</label>
                <input type="number" name="lbs" id="lbs" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</body>
</html
